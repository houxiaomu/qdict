name: Dictonary
options:
  bundleIdPrefix: app.dictonary
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Dictonary:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Dictonary
    resources:
      - path: Dictonary/Prompt/Prompts
      - path: Dictonary/Resources/Assets.xcassets
    info:
      path: Dictonary/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Dictonary
        NSHumanReadableCopyright: "© 2026"
    entitlements:
      path: Dictonary/Resources/Dictonary.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dictonary.Dictonary
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          # Use a stable signing identity for Debug too. Ad-hoc ("-") changes
          # the signature on every build, which invalidates the Keychain ACL
          # for the saved API key and re-prompts for the login password.
          CODE_SIGN_IDENTITY: "simonkey dev"
          CODE_SIGNING_REQUIRED: YES
          # Hardened runtime blocks Xcode's incremental-link debug dylib from
          # loading because that dylib is ad-hoc signed by Xcode. Disable for
          # Debug so the app can launch; Release keeps it on.
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          CODE_SIGN_IDENTITY: "simonkey dev"
          CODE_SIGNING_REQUIRED: YES
  DictonaryTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: DictonaryTests
    dependencies:
      - target: Dictonary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dictonary.DictonaryTests
        CODE_SIGN_STYLE: Manual
        # Match the host app's signing identity so the test bundle dylib can
        # load into the Dictonary process. Ad-hoc here would mismatch the
        # simonkey-dev-signed host and fail at load time.
        CODE_SIGN_IDENTITY: "simonkey dev"
        CODE_SIGNING_REQUIRED: YES
        ENABLE_HARDENED_RUNTIME: NO
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Dictonary:
    build:
      targets:
        Dictonary: all
        DictonaryTests: [test]
    test:
      targets:
        - DictonaryTests
